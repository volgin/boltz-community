name: Affinity Eval Tests

on:
  push:
    branches: [main]
    paths:
      - "tools/affinity-eval/**"
  pull_request:
    branches: [main]
    paths:
      - "tools/affinity-eval/**"
  workflow_dispatch:

jobs:
  affinity-eval-tests:
    name: Affinity eval tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install affinity-eval
        run: pip install -e "tools/affinity-eval[dev]"

      - name: Run tests
        run: pytest tools/affinity-eval/tests/ -v --tb=short
