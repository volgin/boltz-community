name: Manual MPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to test
        required: false
        default: main
      torch_version:
        description: PyTorch version
        required: false
        default: "2.11.0"
      lightning_version:
        description: PyTorch Lightning version
        required: false
        default: "2.6.1"
      pytest_args:
        description: Pytest arguments
        required: false
        default: "tests/test_mps.py -v --tb=short"

jobs:
  mps-tests:
    name: Manual MPS tests
    # Register a self-hosted Apple Silicon runner with the custom label "boltz-mps".
    runs-on: [self-hosted, macOS, ARM64, boltz-mps]
    timeout-minutes: 90
    env:
      PYTHONFAULTHANDLER: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Create virtual environment
        run: |
          python3 -m venv .venv-gha-mps
          . .venv-gha-mps/bin/activate
          python -m pip install -U pip setuptools wheel
          pip install "torch==${{ inputs.torch_version }}" "pytorch-lightning==${{ inputs.lightning_version }}"
          pip install -e ".[test]"

      - name: Show MPS stack
        run: |
          . .venv-gha-mps/bin/activate
          python - <<'PY'
          import platform
          import torch

          print("platform", platform.platform())
          print("torch", torch.__version__)
          print("mps_available", torch.backends.mps.is_available())
          print("mps_built", torch.backends.mps.is_built())
          PY
          sw_vers
          uname -a

      - name: Run MPS tests
        run: |
          . .venv-gha-mps/bin/activate
          pytest ${{ inputs.pytest_args }}

      - name: Clean up
        if: always()
        run: rm -rf .venv-gha-mps
