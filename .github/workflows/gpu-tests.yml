name: GPU Tests

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  gpu-tests:
    name: GPU tests
    # Create this runner in repo Settings > Actions > Runners > New GitHub-hosted runner:
    #   Image: Partner tab > "NVIDIA GPU-Optimized Image for AI and HPC"
    #   Size: GPU-powered tab > 4-core with T4 GPU
    #   Name: gpu-t4
    runs-on: gpu-t4
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install GPU-compatible PyTorch
        run: pip install "torch==2.10.0"

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Show GPU stack
        run: |
          python - <<'PY'
          import torch

          print("torch", torch.__version__)
          print("torch cuda", torch.version.cuda)
          print("cuda available", torch.cuda.is_available())
          PY
          nvidia-smi

      - name: Cache model checkpoints
        uses: actions/cache@v4
        with:
          path: ~/.boltz
          key: boltz-checkpoints-v1

      - name: Run GPU tests
        run: pytest -m "slow or regression" -v --tb=short
